<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2d2b55"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#d63031"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 배경 -->
  <rect width="128" height="128" rx="22" fill="url(#bg)"/>

  <!-- 테두리 강조선 -->
  <rect x="1" y="1" width="126" height="126" rx="21"
        fill="none" stroke="#3d3b6e" stroke-width="1.5" opacity="0.6"/>

  <!-- ! 몸통 (위 직사각형) -->
  <rect x="50" y="12" width="28" height="60" rx="14" fill="url(#accent)" filter="url(#glow)"/>

  <!-- ! 점 (아래 원) -->
  <circle cx="64" cy="104" r="14" fill="url(#accent)" filter="url(#glow)"/>

  <!-- 왼쪽 하단 "bang" 서브텍스트 장식 -->
  <text x="64" y="126" font-family="monospace" font-size="8" font-weight="bold"
        fill="#3d3b6e" text-anchor="middle" opacity="0.8">bang</text>
</svg>
