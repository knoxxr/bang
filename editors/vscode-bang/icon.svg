<svg width="640px" height="650" viewBox="0 0 650 650" role="img" style="margin: auto;" xmlns="http://www.w3.org/2000/svg">
<title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">bang 아이콘 — 어린이 크레파스 빅뱅</title>
<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">찌그러진 원과 거친 선으로 표현한 크레파스 빅뱅 아이콘</desc>
<defs>
  <filter id="crayon">
    <feTurbulence type="fractalNoise" baseFrequency="0.065" numOctaves="5" seed="12" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="9" xChannelSelector="R" yChannelSelector="G" result="displaced"/>
    <feTurbulence type="turbulence" baseFrequency="0.9" numOctaves="2" seed="5" result="texture"/>
    <feComposite in="displaced" in2="texture" operator="in"/>
  </filter>
  <filter id="wobble">
    <feTurbulence type="fractalNoise" baseFrequency="0.03" numOctaves="3" seed="8" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="18" xChannelSelector="R" yChannelSelector="G"/>
  </filter>
  
</defs>

